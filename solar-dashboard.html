<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HELIO — Sistema Solar</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
:root {
  --void: #02040e;
  --deep: #060a18;
  --panel: #0a0f22;
  --border: #162040;
  --text: #b8cce8;
  --dim: #3a4a6a;
  --cyan: #00d4ff;
  --blue: #1e6fff;
  --accent: #ff6b35;
  --gold: #f5c518;
  --green: #00ff9d;
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  background: var(--void);
  color: var(--text);
  font-family: 'Share Tech Mono', monospace;
  height: 100vh;
  overflow: hidden;
  cursor: crosshair;
}

/* ── ESTRELLAS FONDO ── */
#stars {
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 0;
}

/* ── HEADER ── */
#header {
  position: fixed;
  top: 0; left: 0; right: 0;
  height: 56px;
  background: linear-gradient(180deg, rgba(6,10,24,0.98) 0%, rgba(6,10,24,0.0) 100%);
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 24px;
  z-index: 100;
}

#logo {
  font-family: 'Orbitron', sans-serif;
  font-weight: 900;
  font-size: 1.4rem;
  letter-spacing: 0.3em;
  color: var(--cyan);
  text-shadow: 0 0 20px rgba(0,212,255,0.6);
}

#logo span {
  color: var(--dim);
  font-size: 0.6rem;
  letter-spacing: 0.15em;
  display: block;
  font-weight: 400;
  margin-top: -4px;
}

#clock {
  font-size: 0.7rem;
  color: var(--dim);
  letter-spacing: 0.1em;
  text-align: right;
}

#clock .date { color: var(--text); font-size: 0.8rem; }

/* ── BARRA DE BÚSQUEDA ── */
#search-bar {
  position: fixed;
  top: 68px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 100;
  display: flex;
  gap: 8px;
  align-items: center;
}

#search-input {
  background: rgba(10,15,34,0.9);
  border: 1px solid var(--border);
  border-radius: 2px;
  color: var(--text);
  font-family: 'Share Tech Mono', monospace;
  font-size: 0.8rem;
  padding: 6px 14px;
  width: 220px;
  letter-spacing: 0.08em;
  outline: none;
  transition: border-color 0.2s, box-shadow 0.2s;
}

#search-input:focus {
  border-color: var(--cyan);
  box-shadow: 0 0 12px rgba(0,212,255,0.2);
}

#search-input::placeholder { color: var(--dim); }

#search-btn {
  background: transparent;
  border: 1px solid var(--cyan);
  color: var(--cyan);
  font-family: 'Share Tech Mono', monospace;
  font-size: 0.75rem;
  padding: 6px 12px;
  cursor: pointer;
  letter-spacing: 0.1em;
  border-radius: 2px;
  transition: background 0.2s, box-shadow 0.2s;
}

#search-btn:hover {
  background: rgba(0,212,255,0.1);
  box-shadow: 0 0 12px rgba(0,212,255,0.3);
}

#search-suggestions {
  position: absolute;
  top: 100%;
  left: 0;
  background: rgba(10,15,34,0.98);
  border: 1px solid var(--border);
  width: 220px;
  display: none;
  z-index: 200;
}

#search-suggestions div {
  padding: 6px 14px;
  font-size: 0.78rem;
  cursor: pointer;
  letter-spacing: 0.06em;
  transition: background 0.15s;
}

#search-suggestions div:hover {
  background: rgba(0,212,255,0.1);
  color: var(--cyan);
}

/* ── CANVAS PRINCIPAL ── */
#canvas {
  position: fixed;
  inset: 0;
  z-index: 1;
}

/* ── TOOLTIP HOVER ── */
#tooltip {
  position: fixed;
  background: rgba(10,15,34,0.95);
  border: 1px solid var(--cyan);
  padding: 6px 12px;
  font-size: 0.72rem;
  color: var(--cyan);
  letter-spacing: 0.1em;
  pointer-events: none;
  z-index: 200;
  display: none;
  border-radius: 2px;
  box-shadow: 0 0 16px rgba(0,212,255,0.2);
}

/* ── PANEL DE PLANETA ── */
#planet-view {
  position: fixed;
  inset: 0;
  background: var(--void);
  z-index: 300;
  display: none;
  flex-direction: column;
  align-items: center;
  justify-content: flex-start;
  overflow-y: auto;
}

#planet-view.active { display: flex; }

#back-btn {
  position: fixed;
  top: 16px;
  left: 20px;
  background: transparent;
  border: 1px solid var(--dim);
  color: var(--dim);
  font-family: 'Share Tech Mono', monospace;
  font-size: 0.75rem;
  padding: 6px 14px;
  cursor: pointer;
  letter-spacing: 0.1em;
  z-index: 400;
  border-radius: 2px;
  transition: all 0.2s;
}

#back-btn:hover {
  border-color: var(--cyan);
  color: var(--cyan);
  box-shadow: 0 0 10px rgba(0,212,255,0.2);
}

#planet-canvas-wrap {
  position: relative;
  width: 100%;
  display: flex;
  justify-content: center;
  padding-top: 60px;
}

#planet-canvas {
  display: block;
}

#planet-info {
  width: 100%;
  max-width: 900px;
  padding: 0 24px 60px;
  animation: fadeUp 0.5s ease forwards;
}

@keyframes fadeUp {
  from { opacity:0; transform: translateY(20px); }
  to   { opacity:1; transform: translateY(0); }
}

#planet-name-display {
  font-family: 'Orbitron', sans-serif;
  font-weight: 900;
  font-size: clamp(2rem, 6vw, 4rem);
  letter-spacing: 0.25em;
  text-align: center;
  margin-bottom: 6px;
  text-shadow: 0 0 40px currentColor;
}

#planet-type-display {
  font-size: 0.75rem;
  letter-spacing: 0.2em;
  text-align: center;
  color: var(--dim);
  margin-bottom: 32px;
  text-transform: uppercase;
}

#planet-description {
  font-size: 0.82rem;
  line-height: 1.8;
  color: var(--text);
  text-align: center;
  max-width: 700px;
  margin: 0 auto 36px;
  opacity: 0.85;
  letter-spacing: 0.04em;
}

.data-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
  gap: 12px;
  margin-bottom: 24px;
}

.data-card {
  background: var(--panel);
  border: 1px solid var(--border);
  padding: 16px;
  border-radius: 2px;
  transition: border-color 0.2s, box-shadow 0.2s;
}

.data-card:hover {
  border-color: var(--cyan);
  box-shadow: 0 0 16px rgba(0,212,255,0.1);
}

.data-label {
  font-size: 0.65rem;
  letter-spacing: 0.15em;
  color: var(--dim);
  text-transform: uppercase;
  margin-bottom: 6px;
}

.data-value {
  font-family: 'Orbitron', sans-serif;
  font-size: 1.05rem;
  font-weight: 600;
  letter-spacing: 0.05em;
}

.data-unit {
  font-size: 0.65rem;
  color: var(--dim);
  margin-left: 4px;
  font-family: 'Share Tech Mono', monospace;
}

.composition-bar {
  margin-top: 24px;
}

.comp-title {
  font-size: 0.65rem;
  letter-spacing: 0.15em;
  color: var(--dim);
  text-transform: uppercase;
  margin-bottom: 12px;
}

.comp-row {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 8px;
}

.comp-name {
  font-size: 0.72rem;
  width: 120px;
  flex-shrink: 0;
  color: var(--text);
}

.comp-track {
  flex: 1;
  height: 4px;
  background: var(--border);
  border-radius: 2px;
  overflow: hidden;
}

.comp-fill {
  height: 100%;
  border-radius: 2px;
  transition: width 1s ease;
}

.comp-pct {
  font-size: 0.65rem;
  color: var(--dim);
  width: 40px;
  text-align: right;
}

/* ── LIVE BADGE ── */
#live-badge {
  position: fixed;
  bottom: 36px;
  right: 20px;
  font-size: 0.65rem;
  letter-spacing: 0.15em;
  color: var(--green);
  display: flex;
  align-items: center;
  gap: 6px;
  z-index: 100;
}

#live-badge::before {
  content: '';
  width: 6px; height: 6px;
  background: var(--green);
  border-radius: 50%;
  animation: pulse 1.5s infinite;
}

@keyframes pulse {
  0%,100% { opacity:1; box-shadow: 0 0 0 0 rgba(0,255,157,0.5); }
  50% { opacity:0.6; box-shadow: 0 0 0 4px rgba(0,255,157,0); }
}

/* ── LEGEND ── */
#legend {
  position: fixed;
  bottom: 16px;
  left: 0;
  right: 0;
  text-align: center;
  font-size: 0.62rem;
  color: var(--dim);
  letter-spacing: 0.08em;
  z-index: 100;
  line-height: 1.6;
  padding: 0 12px;
}

/* Scrollbar */
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: var(--void); }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
</style>
</head>

<canvas id="stars"></canvas>

  <div id="logo">HELIO<span>OBSERVATORIO DEL SISTEMA SOLAR</span></div>

<!-- Canvas sistema solar -->
<canvas id="canvas"></canvas>

<!-- Tooltip -->
<div id="tooltip"></div>

<!-- Panel planeta -->
<div id="planet-view">

  <div id="planet-canvas-wrap">

</div>

//  EFEMÉRIDES KEPLERIANAS (Jean Meeus, Cap. 31)
// ═══════════════════════════════════════════════════
const ORBITAL_ELEMENTS = {
  mercury: { L0:252.25084, LD:149472.67411, e0:0.20563069, eD:0.00002527, a:0.387098 },
  venus:   { L0:181.97973, LD:58517.81539,  e0:0.00677323, eD:-0.00004938,a:0.723332 },
  earth:   { L0:100.46435, LD:35999.37306,  e0:0.01671022, eD:-0.00003804,a:1.000000 },
  mars:    { L0:355.45332, LD:19140.29934,  e0:0.09341233, eD:0.00011902, a:1.523688 },
  jupiter: { L0:34.40438,  LD:3034.90567,   e0:0.04849485, eD:0.00016322, a:5.202603 },
  saturn:  { L0:49.94432,  LD:1222.11370,   e0:0.05550825, eD:-0.00032495,a:9.537070 },
  uranus:  { L0:313.23218, LD:428.49512,    e0:0.04629590, eD:-0.00020455,a:19.19126 },
  neptune: { L0:304.88003, LD:218.46515,    e0:0.00898809, eD:0.00006539, a:30.06896 },
  pluto:   { L0:238.92881, LD:145.18042,    e0:0.24882730, eD:0.00005170, a:39.48169 },
};

function julianDay(date) {
  let y = date.getUTCFullYear(), m = date.getUTCMonth()+1;
  const d = date.getUTCDate() + date.getUTCHours()/24 + date.getUTCMinutes()/1440 + date.getUTCSeconds()/86400;
  if (m <= 2) { y -= 1; m += 12; }
  const A = Math.floor(y/100), B = 2 - A + Math.floor(A/4);
  return Math.floor(365.25*(y+4716)) + Math.floor(30.6001*(m+1)) + d + B - 1524.5;
}

function getAngle(bodyKey, date) {
  const jd = julianDay(date);
  const T = (jd - 2451545.0) / 36525.0;
  const el = ORBITAL_ELEMENTS[bodyKey];
  if (!el) return 0;
  const L = (el.L0 + el.LD * T) % 360;
  return ((L % 360) + 360) % 360;
}

// Luna: posición real relativa a la Tierra
function getMoonAngle(date) {
  const jd = julianDay(date);
  const T = (jd - 2451545.0) / 36525.0;
  // Longitud media de la Luna (Meeus)
  const L = (218.3164477 + 481267.88123421*T) % 360;
  return ((L % 360) + 360) % 360;
}

// Cometas — posición simplificada basada en período
function getCometAngle(bodyKey, date) {
  const body = BODIES[bodyKey];
  if (!body || !body.period) return Math.random() * 360;
  const jd = julianDay(date);
  const ref = 2451545.0;
  return ((((jd - ref) / body.period) * 360) % 360 + 360) % 360;
}

//  CANVAS DE ESTRELLAS

function initStars() {
  const c = document.getElementById('stars');
  const ctx = c.getContext('2d');
  c.width = window.innerWidth; c.height = window.innerHeight;
  const stars = Array.from({length:300}, () => ({
    x: Math.random()*c.width, y: Math.random()*c.height,
    r: Math.random()*1.2+0.2, a: Math.random(), twinkle: Math.random()*0.02+0.003
  }));
  let t = 0;
  function draw() {
    ctx.clearRect(0,0,c.width,c.height);
    ctx.fillStyle = '#02040e';
    ctx.fillRect(0,0,c.width,c.height);
    stars.forEach(s => {
      const alpha = 0.3 + 0.5*Math.abs(Math.sin(t*s.twinkle + s.a*100));
      ctx.beginPath();
      ctx.arc(s.x, s.y, s.r, 0, Math.PI*2);
      ctx.fillStyle = `rgba(200,220,255,${alpha})`;
      ctx.fill();
    });
    t++;
    requestAnimationFrame(draw);
  }
  draw();
  window.addEventListener('resize', () => { c.width=window.innerWidth; c.height=window.innerHeight; });
}

// ═══════════════════════════════════════════════════
//  SISTEMA SOLAR CANVAS
// ═══════════════════════════════════════════════════
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
let W, H, cx, cy;
let scale = 0.72, offsetX = 0, offsetY = 0;
let isDragging = false, dragStart = {x:0,y:0};
let hitTargets = [];

// Escala visual (px por UA para el radio de órbita máx ~40UA)
function getBaseScale() { return Math.min(W, H) * 0.52 / 42; }

function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
  cx = W/2 + offsetX; cy = H/2 + offsetY;
}

window.addEventListener('resize', resize);
resize();

function orbitPxRadius(ua) {
  // Escala logarítmica: separa planetas interiores sin perder los exteriores
  const logUa = Math.log(ua + 1) / Math.log(42) * 42;
  return logUa * getBaseScale() * scale;
}

function bodyPos(key, now) {
  const b = BODIES[key];
  if (b.isCenter) return { x: cx, y: cy };
  let angle;
  if (key === 'moon') {
    const moonAngleDeg = getMoonAngle(now);
    const moonOrbitPx = 18 * scale; // Luna muy cerca de Tierra en vista global
    const earthAngle = getAngle('earth', now) * Math.PI/180;
    const earthR = orbitPxRadius(1.0);
    const ex = cx + Math.cos(earthAngle) * earthR;
    const ey = cy + Math.sin(earthAngle) * earthR;
    return { x: ex + Math.cos(moonAngleDeg*Math.PI/180)*moonOrbitPx,
             y: ey + Math.sin(moonAngleDeg*Math.PI/180)*moonOrbitPx };
  }
  if (b.isComet) angle = getCometAngle(key, now) * Math.PI/180;
  else           angle = getAngle(key, now) * Math.PI/180;
  const r = orbitPxRadius(b.orbitR);
  return { x: cx + Math.cos(angle)*r, y: cy + Math.sin(angle)*r };
}

function drawOrbit(ua, color, dash) {
  const r = orbitPxRadius(ua);
  ctx.beginPath();
  ctx.arc(cx, cy, r, 0, Math.PI*2);
  ctx.strokeStyle = color;
  ctx.lineWidth = 0.5;
  if (dash) ctx.setLineDash(dash); else ctx.setLineDash([]);
  ctx.stroke();
  ctx.setLineDash([]);
}

function drawAsteroidBelt(now) {
  const innerR = orbitPxRadius(2.2);
  const outerR = orbitPxRadius(3.2);
  const seed = 42;
  for (let i = 0; i < 280; i++) {
    const angle = (i / 280) * Math.PI*2 + (julianDay(now) * 0.0001 + i*0.037);
    const r = innerR + (Math.sin(i*137.5)*0.5+0.5) * (outerR - innerR);
    const x = cx + Math.cos(angle)*r;
    const y = cy + Math.sin(angle)*r;
    const alpha = 0.2 + (Math.sin(i*7.3)*0.5+0.5)*0.4;
    ctx.beginPath();
    ctx.arc(x, y, 0.8 + Math.sin(i*3.7)*0.6, 0, Math.PI*2);
    ctx.fillStyle = `rgba(160,140,100,${alpha})`;
    ctx.fill();
  }
}

function drawSaturnRings(x, y, pr) {
  for (let i = 1.6; i <= 2.4; i += 0.15) {
    ctx.beginPath();
    ctx.ellipse(x, y, pr*i, pr*i*0.28, 0, 0, Math.PI*2);
    ctx.strokeStyle = `rgba(200,180,120,${0.3 - (i-1.6)*0.12})`;
    ctx.lineWidth = pr * 0.18;
    ctx.stroke();
  }
}

function drawComet(x, y, pr, angle) {
  // Cola
  const tailLen = 30 * scale;
  const tailAngle = angle + Math.PI;
  const grd = ctx.createLinearGradient(x, y, x+Math.cos(tailAngle)*tailLen, y+Math.sin(tailAngle)*tailLen);
  grd.addColorStop(0, 'rgba(160,200,255,0.6)');
  grd.addColorStop(1, 'rgba(160,200,255,0)');
  ctx.beginPath();
  ctx.moveTo(x, y);
  ctx.lineTo(x+Math.cos(tailAngle)*tailLen, y+Math.sin(tailAngle)*tailLen);
  ctx.strokeStyle = grd;
  ctx.lineWidth = 2;
  ctx.stroke();
}

function drawSolarSystem(now) {
  ctx.clearRect(0,0,W,H);

  // Órbitas
  const orbitColor = 'rgba(30,64,255,0.18)';
  const cometColor = 'rgba(100,160,255,0.12)';
  ['mercury','venus','earth','mars','jupiter','saturn','uranus','neptune','pluto']
    .forEach(k => drawOrbit(BODIES[k].orbitR, orbitColor));
  drawOrbit(BODIES.halley.orbitR, cometColor, [4,6]);
  drawOrbit(BODIES.churyumov.orbitR, cometColor, [3,5]);

  // Cinturón de asteroides
  drawAsteroidBelt(now);

  hitTargets = [];

  Object.entries(BODIES).forEach(([key, b]) => {
    if (b.isBelt) return;
    const pos = bodyPos(key, now);
    const pr = Math.max(b.radius * (b.isCenter ? 1 : Math.sqrt(scale)) * (b.isCenter ? 1 : 0.85), b.isCenter ? 12 : 3);

    // Cometa: cola
    if (b.isComet) {
      let angle = getCometAngle(key, now) * Math.PI/180;
      drawComet(pos.x, pos.y, pr, angle);
    }

    // Glow
    if (b.glowColor) {
      const glowR = pr * (b.isCenter ? 2.5 : 2.2);
      const grd = ctx.createRadialGradient(pos.x, pos.y, pr*0.5, pos.x, pos.y, glowR);
      grd.addColorStop(0, b.glowColor);
      grd.addColorStop(1, 'rgba(0,0,0,0)');
      ctx.beginPath();
      ctx.arc(pos.x, pos.y, glowR, 0, Math.PI*2);
      ctx.fillStyle = grd;
      ctx.fill();
    }

    // Anillos Saturno
    if (b.hasRings) drawSaturnRings(pos.x, pos.y, pr);

    // Cuerpo
    const bodyGrd = ctx.createRadialGradient(pos.x-pr*0.3, pos.y-pr*0.3, pr*0.1, pos.x, pos.y, pr);
    bodyGrd.addColorStop(0, lightenColor(b.color, 40));
    bodyGrd.addColorStop(1, b.color);
    ctx.beginPath();
    ctx.arc(pos.x, pos.y, pr, 0, Math.PI*2);
    ctx.fillStyle = bodyGrd;
    ctx.fill();

    // Etiqueta
    if (scale > 0.4) {
      ctx.fillStyle = 'rgba(180,200,230,0.7)';
      ctx.font = `${Math.max(9, 10*scale)}px 'Share Tech Mono'`;
      ctx.textAlign = 'center';
      ctx.fillText(b.name.toUpperCase(), pos.x, pos.y + pr + 12);
    }

    // Hit target
    const hitR = Math.max(pr * 1.5, 14);
    hitTargets.push({ key, x: pos.x, y: pos.y, r: hitR });
  });

  // Hit para cinturón
  hitTargets.push({ key:'asteroids', x:cx, y:cy, r: orbitPxRadius(2.7), belt:true });
}

function lightenColor(hex, amt) {
  const n = parseInt(hex.replace('#',''), 16);
  const r = Math.min(255, (n>>16)+amt);
  const g = Math.min(255, ((n>>8)&0xff)+amt);
  const b = Math.min(255, (n&0xff)+amt);
  return `rgb(${r},${g},${b})`;
}

// ── LOOP ──
let animFrame;
function startLoop() {
  function loop() {
    cx = W/2 + offsetX; cy = H/2 + offsetY;
    drawSolarSystem(new Date());
    animFrame = requestAnimationFrame(loop);
  }
  loop();
}
startLoop();

// ── ZOOM ──
canvas.addEventListener('wheel', e => {
  e.preventDefault();
  const delta = e.deltaY > 0 ? 0.9 : 1.11;
  scale = Math.max(0.15, Math.min(8, scale * delta));
}, { passive: false });

// ── DRAG ──
canvas.addEventListener('mousedown', e => { isDragging=true; dragStart={x:e.clientX-offsetX, y:e.clientY-offsetY}; });
canvas.addEventListener('mousemove', e => {
  if (isDragging) { offsetX=e.clientX-dragStart.x; offsetY=e.clientY-dragStart.y; }
  // Tooltip
  const rect = canvas.getBoundingClientRect();
  const mx = e.clientX-rect.left, my = e.clientY-rect.top;
  const hit = getHit(mx, my);
  const tip = document.getElementById('tooltip');
  if (hit) {
    tip.style.display='block';
    tip.style.left=(e.clientX+14)+'px';
    tip.style.top=(e.clientY-10)+'px';
    tip.textContent = BODIES[hit].name.toUpperCase();
    canvas.style.cursor='pointer';
  } else {
    tip.style.display='none';
    canvas.style.cursor='crosshair';
  }
});
canvas.addEventListener('mouseup', () => isDragging=false);

// Touch
canvas.addEventListener('touchstart', e => {
  if (e.touches.length===1) { isDragging=true; dragStart={x:e.touches[0].clientX-offsetX,y:e.touches[0].clientY-offsetY}; }
}, {passive:true});
canvas.addEventListener('touchmove', e => {
  if (isDragging && e.touches.length===1) { offsetX=e.touches[0].clientX-dragStart.x; offsetY=e.touches[0].clientY-dragStart.y; }
}, {passive:true});
canvas.addEventListener('touchend', () => isDragging=false);

function getHit(mx, my) {
  for (const t of hitTargets) {
    if (t.belt) continue;
    const d = Math.hypot(mx-t.x, my-t.y);
    if (d <= t.r) return t.key;
  }
  // Cinturón como último recurso por zona anular
  const d = Math.hypot(mx-cx, my-cy);
  const innerR = orbitPxRadius(2.2);
  const outerR = orbitPxRadius(3.2);
  if (d >= innerR && d <= outerR) return 'asteroids';
  return null;
}

// ── CLIC ──
canvas.addEventListener('click', e => {
  if (isDragging) return;
  const rect = canvas.getBoundingClientRect();
  const hit = getHit(e.clientX-rect.left, e.clientY-rect.top);
  if (hit) showPlanet(hit);
});

// ═══════════════════════════════════════════════════
//  PANEL DE PLANETA
// ═══════════════════════════════════════════════════
function showPlanet(key) {
  const b = BODIES[key];
  cancelAnimationFrame(animFrame);

  const view = document.getElementById('planet-view');
  view.classList.add('active');

  document.getElementById('planet-name-display').textContent = b.name.toUpperCase();
  document.getElementById('planet-name-display').style.color = b.color;
  document.getElementById('planet-type-display').textContent = b.type;
  document.getElementById('planet-description').textContent = b.description;

  // Data grid
  const grid = document.getElementById('data-grid');
  grid.innerHTML = '';
  Object.entries(b.data).forEach(([label, val]) => {
    const card = document.createElement('div');
    card.className = 'data-card';
    card.innerHTML = `<div class="data-label">${label}</div>
      <div class="data-value" style="color:${b.color}">${val.v}<span class="data-unit">${val.u}</span></div>`;
    grid.appendChild(card);
  });

  // Composition
  const bars = document.getElementById('comp-bars');
  bars.innerHTML = '';
  b.composition.forEach(c => {
    const row = document.createElement('div');
    row.className = 'comp-row';
    row.innerHTML = `<div class="comp-name">${c.name}</div>
      <div class="comp-track"><div class="comp-fill" style="width:0%;background:${c.color}" data-pct="${c.pct}"></div></div>
      <div class="comp-pct">${c.pct}%</div>`;
    bars.appendChild(row);
  });
  setTimeout(() => {
    document.querySelectorAll('.comp-fill').forEach(el => {
      el.style.width = el.dataset.pct + '%';
    });
  }, 100);

  // Canvas planeta animado
  drawPlanetCanvas(key);
}

function drawPlanetCanvas(key) {
  if (planetFrame) cancelAnimationFrame(planetFrame);
  const b = BODIES[key];
  const pc = document.getElementById('planet-canvas');
  const pctx = pc.getContext('2d');
  const S = 320;
  pc.width = S; pc.height = S;
  const cx2 = S/2, cy2 = S/2;
  const pr = key === 'sun' ? 100 : key === 'asteroids' ? 85 : 80;
  let angle = 0;

  // Texturas por planeta
  function drawTexture(p, a) {
    pctx.save();
    pctx.beginPath(); pctx.arc(cx2,cy2,pr,0,Math.PI*2); pctx.clip();

    if (p === 'sun') {
      // Sol: capas de plasma amarillo-naranja
      for (let i=0;i<8;i++){
        const g=pctx.createRadialGradient(cx2+Math.cos(a+i)*20,cy2+Math.sin(a+i)*20,5,cx2,cy2,pr);
        g.addColorStop(0,'rgba(255,240,100,0.3)');
        g.addColorStop(1,'rgba(255,140,0,0.05)');
        pctx.fillStyle=g; pctx.fillRect(cx2-pr,cy2-pr,pr*2,pr*2);
      }
      // Manchas solares
      for(let i=0;i<5;i++){
        const sx=cx2+Math.cos(a*0.3+i*1.3)*35, sy=cy2+Math.sin(a*0.2+i*1.1)*25;
        pctx.beginPath(); pctx.ellipse(sx,sy,8,5,a+i,0,Math.PI*2);
        pctx.fillStyle='rgba(180,80,0,0.5)'; pctx.fill();
      }
    } else if (p === 'mercury') {
      // Mercurio: superficie gris con cráteres
      for(let i=0;i<12;i++){
        const cx3=cx2+Math.cos(i*0.8+a*0.1)*50, cy3=cy2+Math.sin(i*0.6+a*0.1)*45;
        const r3=4+Math.sin(i*3)*3;
        pctx.beginPath(); pctx.arc(cx3,cy3,r3,0,Math.PI*2);
        pctx.fillStyle='rgba(80,80,80,0.4)'; pctx.fill();
        pctx.beginPath(); pctx.arc(cx3,cy3,r3*1.4,0,Math.PI*2);
        pctx.strokeStyle='rgba(160,160,160,0.25)'; pctx.lineWidth=1.5; pctx.stroke();
      }
    } else if (p === 'venus') {
      // Venus: bandas de nubes amarillentas
      for(let i=-5;i<=5;i++){
        const y3=cy2+i*14+Math.sin(a*0.5+i)*4;
        pctx.beginPath(); pctx.rect(cx2-pr,y3-3,pr*2,6);
        pctx.fillStyle=`rgba(255,220,100,${0.08+Math.sin(i+a)*0.04})`; pctx.fill();
      }
      // Remolinos
      for(let i=0;i<3;i++){
        pctx.beginPath();
        pctx.arc(cx2+Math.cos(a*0.3+i*2)*30, cy2+Math.sin(a*0.2+i*2)*20, 18, 0, Math.PI*2);
        pctx.strokeStyle='rgba(200,160,50,0.2)'; pctx.lineWidth=3; pctx.stroke();
      }
    } else if (p === 'earth') {
      // Tierra: oceanos, continentes y nubes
      // Océano base ya pintado
      // Continente 1 (América)
      pctx.beginPath();
      pctx.ellipse(cx2-20+Math.cos(a)*2, cy2, 18, 35, -0.3+a*0.01, 0, Math.PI*2);
      pctx.fillStyle='rgba(60,160,60,0.75)'; pctx.fill();
      // Continente 2 (Eurasia-África)
      pctx.beginPath();
      pctx.ellipse(cx2+22+Math.cos(a+1)*2, cy2-5, 22, 38, 0.2+a*0.01, 0, Math.PI*2);
      pctx.fillStyle='rgba(70,150,50,0.7)'; pctx.fill();
      // Casquete polar N
      pctx.beginPath(); pctx.arc(cx2, cy2-pr+8, 20, 0, Math.PI*2);
      pctx.fillStyle='rgba(220,240,255,0.8)'; pctx.fill();
      // Casquete polar S
      pctx.beginPath(); pctx.arc(cx2, cy2+pr-8, 16, 0, Math.PI*2);
      pctx.fillStyle='rgba(220,240,255,0.7)'; pctx.fill();
      // Nubes
      for(let i=0;i<6;i++){
        pctx.beginPath();
        pctx.ellipse(cx2+Math.cos(a*0.4+i*1.1)*45, cy2+Math.sin(a*0.3+i*0.9)*30, 20, 8, a*0.1+i, 0, Math.PI*2);
        pctx.fillStyle='rgba(255,255,255,0.22)'; pctx.fill();
      }
    } else if (p === 'moon') {
      // Luna: gris con cráteres y mares
      for(let i=0;i<15;i++){
        const cx3=cx2+Math.cos(i*0.7)*45, cy3=cy2+Math.sin(i*0.5)*40;
        pctx.beginPath(); pctx.arc(cx3,cy3,5+Math.sin(i*4)*3,0,Math.PI*2);
        pctx.fillStyle='rgba(60,60,60,0.35)'; pctx.fill();
      }
      // Mare Tranquillitatis
      pctx.beginPath(); pctx.ellipse(cx2+15,cy2-10,25,20,0.3,0,Math.PI*2);
      pctx.fillStyle='rgba(50,50,60,0.4)'; pctx.fill();
    } else if (p === 'mars') {
      // Marte: superficie rojiza con cañones y casquetes
      // Valles Marineris
      pctx.beginPath();
      pctx.moveTo(cx2-45, cy2+5+Math.sin(a)*2);
      pctx.bezierCurveTo(cx2-20,cy2+15,cx2+20,cy2-5,cx2+50,cy2+8);
      pctx.strokeStyle='rgba(100,30,10,0.6)'; pctx.lineWidth=5; pctx.stroke();
      // Olympus Mons (volcán)
      pctx.beginPath(); pctx.arc(cx2-25, cy2-20, 14, 0, Math.PI*2);
      pctx.fillStyle='rgba(160,70,30,0.5)'; pctx.fill();
      pctx.beginPath(); pctx.arc(cx2-25, cy2-20, 6, 0, Math.PI*2);
      pctx.fillStyle='rgba(100,40,20,0.6)'; pctx.fill();
      // Casquetes polares
      pctx.beginPath(); pctx.arc(cx2, cy2-pr+10, 16, 0, Math.PI*2);
      pctx.fillStyle='rgba(255,240,230,0.7)'; pctx.fill();
      pctx.beginPath(); pctx.arc(cx2, cy2+pr-10, 10, 0, Math.PI*2);
      pctx.fillStyle='rgba(255,240,230,0.5)'; pctx.fill();
      // Textura polvo
      for(let i=0;i<8;i++){
        pctx.beginPath();
        pctx.arc(cx2+Math.cos(i*0.9+a*0.1)*40,cy2+Math.sin(i*0.7+a*0.1)*35,8,0,Math.PI*2);
        pctx.fillStyle='rgba(120,50,20,0.2)'; pctx.fill();
      }
    } else if (p === 'jupiter') {
      // Júpiter: bandas horizontales características
      const bands=[
        {y:-60,h:12,c:'rgba(200,150,100,0.5)'},
        {y:-45,h:18,c:'rgba(160,100,60,0.45)'},
        {y:-25,h:14,c:'rgba(220,180,130,0.4)'},
        {y:-10,h:20,c:'rgba(180,120,70,0.5)'},
        {y:12,h:16,c:'rgba(210,160,100,0.45)'},
        {y:30,h:12,c:'rgba(150,90,50,0.4)'},
        {y:44,h:18,c:'rgba(200,150,100,0.45)'},
      ];
      bands.forEach(bd=>{
        pctx.beginPath();
        pctx.rect(cx2-pr, cy2+bd.y, pr*2, bd.h);
        pctx.fillStyle=bd.c; pctx.fill();
      });
      // Gran Mancha Roja
      const gx=cx2+Math.cos(a*0.05)*10, gy=cy2+8;
      pctx.beginPath(); pctx.ellipse(gx,gy,22,14,0,0,Math.PI*2);
      pctx.fillStyle='rgba(180,60,30,0.65)'; pctx.fill();
      pctx.beginPath(); pctx.ellipse(gx,gy,14,8,0,0,Math.PI*2);
      pctx.fillStyle='rgba(220,80,40,0.5)'; pctx.fill();
    } else if (p === 'saturn') {
      // Saturno: bandas suaves doradas
      const bands2=[
        {y:-50,h:15,c:'rgba(220,200,140,0.4)'},
        {y:-33,h:12,c:'rgba(180,150,90,0.4)'},
        {y:-20,h:20,c:'rgba(230,210,150,0.35)'},
        {y:2,h:16,c:'rgba(190,160,100,0.4)'},
        {y:20,h:14,c:'rgba(215,195,135,0.35)'},
        {y:36,h:16,c:'rgba(175,145,85,0.4)'},
      ];
      bands2.forEach(bd=>{
        pctx.beginPath(); pctx.rect(cx2-pr,cy2+bd.y,pr*2,bd.h);
        pctx.fillStyle=bd.c; pctx.fill();
      });
    } else if (p === 'uranus') {
      // Urano: gradiente cian uniforme con bandas tenues
      for(let i=-4;i<=4;i++){
        pctx.beginPath(); pctx.rect(cx2-pr,cy2+i*16,pr*2,8);
        pctx.fillStyle=`rgba(100,220,220,${0.06+Math.abs(Math.sin(i+a))*0.04})`; pctx.fill();
      }
      // Eje inclinado (característica de Urano)
      pctx.beginPath();
      pctx.moveTo(cx2-pr*0.7, cy2-pr*0.7);
      pctx.lineTo(cx2+pr*0.7, cy2+pr*0.7);
      pctx.strokeStyle='rgba(150,240,240,0.15)'; pctx.lineWidth=3; pctx.stroke();
    } else if (p === 'neptune') {
      // Neptuno: bandas azul profundo con Gran Mancha Oscura
      for(let i=-4;i<=4;i++){
        pctx.beginPath(); pctx.rect(cx2-pr,cy2+i*16,pr*2,10);
        pctx.fillStyle=`rgba(40,60,200,${0.15+Math.sin(i*0.8+a)*0.07})`; pctx.fill();
      }
      // Gran Mancha Oscura
      pctx.beginPath(); pctx.ellipse(cx2-15+Math.cos(a*0.08)*8, cy2-15, 20, 12, 0.3, 0, Math.PI*2);
      pctx.fillStyle='rgba(10,20,120,0.6)'; pctx.fill();
    } else if (p === 'pluto') {
      // Plutón: región Tombaugh (corazón)
      pctx.beginPath();
      pctx.arc(cx2+10, cy2+5, 25, 0, Math.PI*2);
      pctx.fillStyle='rgba(220,200,160,0.4)'; pctx.fill();
      // Textura cratérica
      for(let i=0;i<8;i++){
        pctx.beginPath(); pctx.arc(cx2+Math.cos(i*0.9)*35,cy2+Math.sin(i*0.7)*32,4,0,Math.PI*2);
        pctx.fillStyle='rgba(80,60,40,0.4)'; pctx.fill();
      }
    } else if (p === 'halley' || p === 'hale_bopp' || p === 'churyumov') {
      // Cometas: núcleo irregular oscuro
      for(let i=0;i<6;i++){
        pctx.beginPath();
        pctx.arc(cx2+Math.cos(i*1.1)*15, cy2+Math.sin(i*0.9)*12, 12, 0, Math.PI*2);
        pctx.fillStyle='rgba(40,30,20,0.5)'; pctx.fill();
      }
      // Cráteres de sublimación
      for(let i=0;i<8;i++){
        pctx.beginPath(); pctx.arc(cx2+Math.cos(i*0.8+a)*30,cy2+Math.sin(i*0.7+a)*25,3,0,Math.PI*2);
        pctx.fillStyle='rgba(180,160,120,0.3)'; pctx.fill();
      }
    }
    pctx.restore();
  }

  function draw2() {
    pctx.clearRect(0,0,S,S);

    // Glow exterior
    const g = pctx.createRadialGradient(cx2,cy2,pr*0.8,cx2,cy2,pr*2.2);
    g.addColorStop(0, b.glowColor || 'rgba(100,100,200,0.3)');
    g.addColorStop(1,'rgba(0,0,0,0)');
    pctx.beginPath(); pctx.arc(cx2,cy2,pr*2.2,0,Math.PI*2);
    pctx.fillStyle=g; pctx.fill();

    // Anillos Saturno DETRÁS
    if (b.hasRings) {
      for(let i=1.5;i<=2.6;i+=0.16){
        pctx.beginPath();
        pctx.ellipse(cx2,cy2,pr*i,pr*i*0.28,0,0,Math.PI*2);
        pctx.strokeStyle=`rgba(200,175,110,${0.4-(i-1.5)*0.15})`;
        pctx.lineWidth=pr*0.22; pctx.stroke();
      }
    }

    // Base del planeta
    const base = pctx.createRadialGradient(cx2-pr*0.25,cy2-pr*0.25,pr*0.05,cx2,cy2,pr);
    base.addColorStop(0, b.color);
    base.addColorStop(1, darkenColor(b.color, 55));
    pctx.beginPath(); pctx.arc(cx2,cy2,pr,0,Math.PI*2);
    pctx.fillStyle=base; pctx.fill();

    // Textura específica del planeta
    drawTexture(key, angle);

    // Sombra lateral (terminator)
    const shadow = pctx.createRadialGradient(cx2+pr*0.55,cy2,0,cx2+pr*0.3,cy2,pr*1.05);
    shadow.addColorStop(0,'rgba(0,0,0,0)');
    shadow.addColorStop(0.6,'rgba(0,0,0,0.1)');
    shadow.addColorStop(1,'rgba(0,0,0,0.55)');
    pctx.beginPath(); pctx.arc(cx2,cy2,pr,0,Math.PI*2);
    pctx.fillStyle=shadow; pctx.fill();

    // Asteroides: anillo
    if (key==='asteroids') {
      pctx.clearRect(0,0,S,S);
      for(let i=0;i<80;i++){
        const a2=(i/80)*Math.PI*2+angle;
        const r2=50+Math.sin(i*5)*22;
        pctx.beginPath();
        pctx.arc(cx2+Math.cos(a2)*r2,cy2+Math.sin(a2)*r2,1.5+Math.sin(i*3)*1,0,Math.PI*2);
        pctx.fillStyle=`rgba(180,160,110,${0.4+Math.sin(i*7)*0.3})`; pctx.fill();
      }
    }

    angle += 0.006;
    planetFrame = requestAnimationFrame(draw2);
  }
  draw2();
}


function drawSaturnRings2(ctx2, x, y, pr) {
  for (let i=1.5;i<=2.5;i+=0.18) {
    ctx2.beginPath();
    ctx2.ellipse(x,y,pr*i,pr*i*0.3,0,0,Math.PI*2);
    ctx2.strokeStyle=`rgba(200,180,120,${0.35-(i-1.5)*0.1})`;
    ctx2.lineWidth=pr*0.2; ctx2.stroke();
  }
}

function darkenColor(hex, amt) {
  const n = parseInt(hex.replace('#',''), 16);
  const r = Math.max(0,(n>>16)-amt);
  const g = Math.max(0,((n>>8)&0xff)-amt);
  const b = Math.max(0,(n&0xff)-amt);
  return `rgb(${r},${g},${b})`;
}

// Volver
document.getElementById('back-btn').addEventListener('click', () => {
  document.getElementById('planet-view').classList.remove('active');
  document.getElementById('tooltip').style.display='none';
  startLoop();
});

// ═══════════════════════════════════════════════════
//  BÚSQUEDA
// ═══════════════════════════════════════════════════
const allNames = Object.entries(BODIES).map(([k,b]) => ({key:k, name:b.name}));
const input = document.getElementById('search-input');
const sugg = document.getElementById('search-suggestions');

input.addEventListener('input', () => {
  const q = input.value.trim().toLowerCase();
  if (!q) { sugg.style.display='none'; return; }
  const matches = allNames.filter(n => n.name.toLowerCase().includes(q));
  if (!matches.length) { sugg.style.display='none'; return; }
  sugg.innerHTML = matches.map(m => `<div data-key="${m.key}">${m.name}</div>`).join('');
  sugg.style.display='block';
  sugg.querySelectorAll('div').forEach(d => {
    d.addEventListener('click', () => { showPlanet(d.dataset.key); sugg.style.display='none'; input.value=''; });
  });
});

document.getElementById('search-btn').addEventListener('click', () => {
  const q = input.value.trim().toLowerCase();
  const match = allNames.find(n => n.name.toLowerCase().includes(q));
  if (match) { showPlanet(match.key); sugg.style.display='none'; input.value=''; }
});

input.addEventListener('keydown', e => {
  if (e.key === 'Enter') document.getElementById('search-btn').click();
  if (e.key === 'Escape') { sugg.style.display='none'; input.blur(); }
});

document.addEventListener('click', e => {
  if (!e.target.closest('#search-bar')) sugg.style.display='none';
});

// ═══════════════════════════════════════════════════
//  RELOJ
// ═══════════════════════════════════════════════════
function updateClock() {
  const now = new Date();
  const opts = { weekday:'short', year:'numeric', month:'short', day:'numeric' };
  document.getElementById('clock-date').textContent = now.toLocaleDateString('es-MX', opts).toUpperCase();
  document.getElementById('clock-time').textContent = now.toLocaleTimeString('es-MX') + ' UTC' + (now.getTimezoneOffset()/60 > 0 ? '-' : '+') + Math.abs(now.getTimezoneOffset()/60);
}
updateClock();
setInterval(updateClock, 1000);

// Init
initStars();
